name: LLM Chat Android
id: chatapp_android
license_url: https://github.com/qualcomm/ai-hub-apps/blob/main/LICENSE
license_type: bsd-3-clause
models: ['llama_v3_2_1b_instruct']
private_model_s3_paths:
  llama_v3_2_3b_instruct:
    w4:
      # CI Runs out of disk space with a full model, so we use a 'dummy model' copy. The dummy has context binary files that are empty.
      qualcomm-snapdragon-8gen3: 'qai-hub-models/release-assets/v0.41.0/Llama-v3.2-1B-Instruct/precompiled/qualcomm-snapdragon-8gen3/Llama-v3.2-1B-Instruct_w4_DUMMY_MODELS.genie.zip'
model_file_dir: 'src/main/assets/models/llm'
runtime: genie
status: published
domain: Generative AI
headline: Run an LLM on Android
description: A sample Android chat app showcasing how to integrate an on-device LLM with Qualcomm® Gen AI Inference Extensions (Genie) APIs, optimized for Snapdragon® NPU acceleration.
precisions: [w4a16]
app_type: 'android'
base_docker: ubuntu.dockerfile
qaihm_version: 'v0.41.0'
static_img_filename: 'app_screen.png'
app_repo_relative_path: 'chatapp_android'
os:
  name: Android
  version: 15+
languages: ['Java', 'C++']
use_case: Text Generation
related_models: ['qwen3_4b_instruct_2507', 'llama_v3_2_3b_instruct']
supported_devices: ["Snapdragon 8 Elite QRD"]
